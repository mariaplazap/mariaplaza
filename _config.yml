title: María Plaza
description: > # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
permalink: ':title/'
baseurl: "/mariaplaza" # the subpath of your site, e.g. /blog
url: "https://mariaplazap.github.io/mariaplaza/" # the base hostname & protocol for your site, e.g. http://example.com


# Author Settings
author: María Plaza # add your name
author-img: mariaplazagithub.JPG # add your photo
about-author: >
  I am an Industrial Design and Product Development Engineering PhD student 
  at the University of Zaragoza, Spain, focusing on Perception and User Experience 
  in Immersive Realities.
  <br><br>
  Check our research at <a href="https://graphics.unizar.es/" target="_blank" style="color: #2196f3; text-decoration: underline;">Graphics & Imaging Lab</a>
  <br><br>
  <i>(Site under construction)</i> 
social-linkedin: maría-plaza-pérez # add your Linkedin handle
social-email: mplaza@unizar.es # add your Email address


# Disqus
#discus-identifier: mr-brown # add your discus identifier

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
remote_theme: flexible-jekyll
